# Force Broadcom BCM43602 to use brcmfmac on MBP14,3.
# These legacy/proprietary modules can bind first or create conflicts.
blacklist b43
blacklist b43legacy
blacklist brcmsmac
blacklist ssb
blacklist bcma
blacklist wl

# Ensure dependency order when brcmfmac is requested.
softdep brcmfmac pre: cfg80211 brcmutil

# Disable internal roaming engine to prevent disconnect cycle.
options brcmfmac roamoff=1
