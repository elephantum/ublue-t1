# Force Broadcom BCM43602 to use brcmfmac on MBP14,3.
# These legacy/proprietary modules can bind first or create conflicts.
blacklist b43
blacklist b43legacy
blacklist brcmsmac
blacklist ssb
blacklist bcma
blacklist wl

# Ensure dependency order when brcmfmac is requested.
softdep brcmfmac pre: cfg80211 brcmutil

# Disable firmware WPA supplicant (FWSUP) which causes flowring timeouts and periodic disconnects.
# Let the host OS handle WPA authentication instead.
# Also disable roaming which can trigger reconnects.
options brcmfmac feature_disable=0x2000 roamoff=1
