name: Build and Push

on:
  push:
    branches: [master]
    paths:
      - 'Containerfile'
      - 'build_files/**'
      - 'system_files/**'
      - 'Justfile'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - 'Containerfile'
      - 'build_files/**'
      - 'system_files/**'
      - 'Justfile'
      - '.github/workflows/**'
  schedule:
    - cron: '0 4 * * 1'   # weekly Monday — picks up bluefin-dx:latest updates
  workflow_dispatch:

env:
  IMAGE: ghcr.io/elephantum/ublue-t1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "VERSION=$(date +%Y%m%d).pr${{ github.event.pull_request.number }}.${{ github.run_number }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=$(date +%Y%m%d).${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Set tags
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "TAGS=${{ env.IMAGE }}:${{ env.VERSION }}" >> "$GITHUB_ENV"
          else
            {
              echo 'TAGS<<EOF'
              echo '${{ env.IMAGE }}:latest'
              echo '${{ env.IMAGE }}:${{ env.VERSION }}'
              echo 'EOF'
            } >> "$GITHUB_ENV"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ env.TAGS }}
          build-args: |
            VERSION=${{ env.VERSION }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
